<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priyadarshani BPSC PYQ Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="home-page">

  <!-- Ambient background -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-badge">BPSC PYQ</span>
        <h1 class="brand-title">Priyadarshani<br><span class="brand-sub">MCQ Practice</span></h1>
      </div>
      <p class="brand-tagline">Chapter-wise Previous Year Questions from Priyadarshani Book Series</p>
    </div>
  </header>

  <main class="home-main">
    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><span class="stat-num" id="totalSubjects">—</span><span class="stat-label">Subjects</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-num" id="totalChapters">—</span><span class="stat-label">Chapters</span></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><span class="stat-num" id="totalQuestions">—</span><span class="stat-label">Questions</span></div>
    </div>

    <h2 class="section-title">Choose a Subject</h2>

    <!-- Subject grid -->
    <div class="subject-grid" id="subjectGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Chapter panel (shown when subject selected) -->
    <div class="chapter-panel" id="chapterPanel" hidden>
      <div class="chapter-panel-header">
        <button class="btn-back" id="btnBack">← Back</button>
        <div class="chapter-panel-title">
          <span id="panelEmoji"></span>
          <span id="panelSubject"></span>
        </div>
      </div>
      <div class="chapter-options">
        <button class="chapter-card all-chapters" id="btnAllChapters">
          <span class="ch-icon">📚</span>
          <span class="ch-name">All Chapters</span>
          <span class="ch-count" id="allChCount"></span>
          <span class="ch-arrow">→</span>
        </button>
      </div>
      <div class="chapter-list" id="chapterList"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Questions sourced from Priyadarshani Book Series &nbsp;|&nbsp; For BPSC Prelims Preparation</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
